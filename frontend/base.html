<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameDistro | Dynamic Streaming & Discovery</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #ff4d4d, #3b82f6);
            --transition-speed: 0.8s;
            --netflix-red: #e50914;
            --accent: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
        }

        /* --- Search Overlay --- */
        #search-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            z-index: 200;
            display: none;
            flex-direction: column;
            padding: 2rem 4rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .search-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 3rem;
        }

        .search-input-wrapper { flex-grow: 1; }

        #main-search-input {
            width: 100%;
            background: #222;
            border: 1px solid #444;
            padding: 15px 20px;
            border-radius: 4px;
            color: #fff;
            font-size: 1.2rem;
            outline: none;
        }

        #main-search-input:focus { border-color: var(--netflix-red); }

        .close-search {
            font-size: 2.5rem;
            cursor: pointer;
            color: #888;
            transition: 0.3s;
        }
        .close-search:hover { color: #fff; transform: rotate(90deg); }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        /* --- Hero Section & Layers --- */
        .hero-section {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #bg-image-layer {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            filter: brightness(0.4);
            transition: background-image var(--transition-speed) ease-in-out;
            z-index: -2;
        }

        #bg-glow {
            position: absolute;
            inset: 0;
            background: var(--bg-gradient);
            filter: blur(100px) saturate(2);
            opacity: 0.3;
            z-index: -1;
            transition: background var(--transition-speed) ease-in-out;
        }

        header {
            position: relative; 
            z-index: 100;
            display: flex; 
            justify-content: space-between;
            align-items: center;
            padding: 2rem 4rem;
        }

        .logo { font-size: 1.5rem; font-weight: 900; color: var(--netflix-red); letter-spacing: -1px; }

        nav { display: flex; align-items: center; gap: 1.5rem; }

        .search-trigger {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
        }

        .search-trigger svg { width: 18px; height: 18px; fill: #fff; margin-right: 10px; }
        .search-trigger span { font-size: 0.85rem; color: #ccc; }

        nav a { text-decoration: none; color: #ccc; font-size: 0.85rem; transition: 0.3s; }
        nav a:hover { color: #fff; }

        /* --- Main Content --- */
        main {
            position: relative; z-index: 10;
            flex-grow: 1;
            padding: 0 4rem;
            display: flex; flex-direction: column;
            justify-content: center;
        }

        .hero-text { transition: opacity 0.4s ease, transform 0.4s ease; }
        .hero-text.fade { opacity: 0; transform: translateY(20px); }

        h1 { font-size: 5rem; font-weight: 800; letter-spacing: -2px; margin-bottom: 1rem; }
        .description { max-width: 500px; font-size: 1.1rem; line-height: 1.6; color: #bbb; }

        /* --- Tabs --- */
        footer {
            position: relative; z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tabs { display: grid; grid-template-columns: repeat(4, 1fr); }

        .tab-btn {
            background: none; border: none; border-top: 3px solid transparent;
            padding: 1.5rem; font-size: 0.7rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1.5px; color: #666;
            cursor: pointer; transition: 0.3s;
        }

        .tab-btn.active { color: #fff; border-top-color: #fff; background: rgba(255,255,255,0.05); }

        /* --- Grid Content --- */
        .content-container { padding: 4rem; background: #000; }
        .freegames {
            display: flex; gap: 20px; padding: 20px 0;
            overflow-x: auto; scrollbar-width: none;
        }
        .freegames::-webkit-scrollbar { display: none; }

        .card, .result-card {
            min-width: 280px; background: #141414; border-radius: 8px;
            overflow: hidden; border: 1px solid #222; transition: 0.3s;
            cursor: pointer;
        }
        .card:hover, .result-card:hover { transform: scale(1.05); border-color: #444; z-index: 2; }
        .card img, .result-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .card_title, .result-card div { padding: 1rem; font-size: 0.9rem; font-weight: 600; color: #efefef; }

    </style>
</head>
<body>

    <div id="search-overlay">
        <div class="search-header">
            <div class="search-input-wrapper">
                <input type="text" id="main-search-input" placeholder="Search titles, genres, or developers...">
            </div>
            <div class="close-search" onclick="toggleSearch(false)">&times;</div>
        </div>
        <div class="results-container">
            <h2 id="search-heading" style="margin-bottom: 1.5rem; color: #888;">Recommended for You</h2>
            <div class="results-grid" id="results-grid"></div>
        </div>
    </div>

    <div class="hero-section" id="hero-main">
        <div id="bg-image-layer" style="background-image: url('https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=2070');"></div>
        <div id="bg-glow"></div>

        <header>
            <div class="logo">GAMEDISTRO</div>
            <nav>
                <div class="search-trigger" onclick="toggleSearch(true)">
                    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    <span>Search</span>
                </div>
                <a href="pages/groups/base.htm">Groups</a>
                <a href="pages/game dev pages/dev_dashboard.htm">Developers</a>
                <a href="pages/signup_login.htm">Sign In</a>
            </nav>
        </header>

        <main>
            <div class="hero-text" id="hero-container">
                <h1 id="title">Pixel Streaming</h1>
                <p class="description" id="desc">Deliver high-end graphics to any device instantly with zero latency using our global edge network.</p>
            </div>
        </main>

        <footer>
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('pixel', this)">Pixel Streaming</button>
                <button class="tab-btn" onclick="switchTab('ml', this)">Machine Learning</button>
                <button class="tab-btn" onclick="switchTab('inference', this)">Inference</button>
                <button class="tab-btn" onclick="switchTab('vfx', this)">VFX & Rendering</button>
            </div>
        </footer>
    </div>

    <div class="content-container">
        <h4 style="margin-bottom: 1.5rem; color: #888; text-transform: uppercase; letter-spacing: 1px;">Latest Discounts</h4>
        <div class="freegames" id="home-game-list">
            </div>
    </div>

    <script>
        const heroData = {
            pixel: {
                title: "Pixel Streaming",
                desc: "Deliver high-end graphics to any device instantly with zero latency using our global edge network.",
                gradient: "linear-gradient(135deg, #ff4d4d, #3b82f6)",
                image: "https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=2070"
            },
            ml: {
                title: "ML & AI",
                desc: "Train complex neural networks in record time. Scaling your models from prototype to production has never been easier.",
                gradient: "linear-gradient(135deg, #f59e0b, #10b981)",
                image: "https://images.unsplash.com/photo-1677442136019-21780ecad995?auto=format&fit=crop&q=80&w=2070"
            },
            inference: {
                title: "Inference Service",
                desc: "Deploy AI models at the edge for lightning-fast responses. Scale to millions of users without managing servers.",
                gradient: "linear-gradient(135deg, #3b82f6, #a855f7)",
                image: "https://images.unsplash.com/photo-1620712943543-bcc4688e7485?auto=format&fit=crop&q=80&w=2070"
            },
            vfx: {
                title: "VFX & Rendering",
                desc: "Power through cinematic renders. Our GPU clusters handle the heaviest workloads so you can focus on creativity.",
                gradient: "linear-gradient(135deg, #0ea5e9, #6366f1)",
                image: "https://images.unsplash.com/photo-1614850523296-d8c1af93d400?auto=format&fit=crop&q=80&w=2067"
            }
        };

        const games = [
            { title: "Elden Ring: Shadow of Erdtree", img: "https://www.bing.com/th/id/OSK.gMmC4T84yrEKrcDFarE4VE9m2L2gudkHQKwlDi1npKo?w=224&h=200&c=8&rs=1&qlt=90&o=6&cb=defcache1&dpr=1.3&pid=3.1&rm=2&defcache=1" },
            { title: "Cyberpunk 2077", img: "https://images.unsplash.com/photo-1605898835373-023ad4270243?auto=format&fit=crop&q=80&w=400" },
            { title: "Ghost of Tsushima", img: "https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=400" },
            { title: "Starfield", img: "https://images.unsplash.com/photo-1614850523296-d8c1af93d400?auto=format&fit=crop&q=80&w=400" },
            { title: "The Witcher 3", img: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80&w=400" }
        ];

        let currentIndex = 0;
        let autoShiftInterval;
        const keys = Object.keys(heroData);

        // --- Search Logic ---
        function toggleSearch(show) {
            const overlay = document.getElementById('search-overlay');
            overlay.style.display = show ? 'flex' : 'none';
            if(show) {
                document.getElementById('main-search-input').focus();
                renderResults(games);
            }
        }

        function renderResults(list) {
            const grid = document.getElementById('results-grid');
            grid.innerHTML = list.map(game => `
                <div class="result-card">
                    <img src="${game.img}" alt="${game.title}">
                    <div>${game.title}</div>
                </div>
            `).join('');
        }

        document.getElementById('main-search-input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const heading = document.getElementById('search-heading');
            if (term === "") {
                heading.innerText = "Recommended for You";
                renderResults(games);
            } else {
                const filtered = games.filter(g => g.title.toLowerCase().includes(term));
                heading.innerText = filtered.length ? `Results for "${term}"` : "No results found";
                renderResults(filtered);
            }
        });

        // --- Hero Switch Logic ---
        function switchTab(id, el) {
            const container = document.getElementById('hero-container');
            const titleEl = document.getElementById('title');
            const descEl = document.getElementById('desc');
            const imgLayer = document.getElementById('bg-image-layer');

            currentIndex = keys.indexOf(id);
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtn = el || document.querySelectorAll('.tab-btn')[currentIndex];
            activeBtn.classList.add('active');

            container.classList.add('fade');
            setTimeout(() => {
                const info = heroData[id];
                titleEl.innerText = info.title;
                descEl.innerText = info.desc;
                imgLayer.style.backgroundImage = `url('${info.image}')`;
                document.documentElement.style.setProperty('--bg-gradient', info.gradient);
                container.classList.remove('fade');
            }, 400);
            resetAutoShift();
        }

        function startAutoShift() {
            autoShiftInterval = setInterval(() => {
                currentIndex = (currentIndex + 1) % keys.length;
                switchTab(keys[currentIndex]);
            }, 6000);
        }

        function resetAutoShift() {
            clearInterval(autoShiftInterval);
            startAutoShift();
        }

        // Initialize Home Grid
        function initHomeGrid() {
            const homeGrid = document.getElementById('home-game-list');
            homeGrid.innerHTML = games.map(game => `
                <div class="card">
                    <img src="${game.img}" alt="${game.title}">
                    <div class="card_title">${game.title}</div>
                </div>
            `).join('');
        }

        window.onload = () => {
            startAutoShift();
            initHomeGrid();
        };
    </script>
</body>
</html>
