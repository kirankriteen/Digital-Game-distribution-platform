<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameDistro | Streaming & Discovery</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #ff4d4d, #3b82f6);
            --transition-speed: 0.8s;
            --netflix-red: #e50914;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
        }

        /* --- Hero Section --- */
        .hero-section {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.5s ease;
        }

        #bg-image-layer {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            filter: brightness(0.4);
            transition: background-image var(--transition-speed) ease-in-out;
            z-index: -2;
        }

        header {
            position: relative; 
            z-index: 100;
            display: flex; 
            justify-content: space-between;
            align-items: center;
            padding: 2rem 4rem;
        }

        .logo { font-size: 1.5rem; font-weight: 900; color: var(--netflix-red); letter-spacing: -1px; }

        /* --- Search Trigger Button --- */
        .search-trigger {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
        }

        .search-trigger:hover { background: rgba(255, 255, 255, 0.2); }
        .search-trigger svg { width: 18px; height: 18px; fill: #fff; margin-right: 10px; }
        .search-trigger span { font-size: 0.85rem; color: #ccc; }

        nav a { text-decoration: none; color: #ccc; font-size: 0.85rem; margin-left: 1.5rem; }

        /* --- Full Screen Search Overlay --- */
        #search-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            z-index: 200;
            display: none; /* Hidden by default */
            flex-direction: column;
            padding: 2rem 4rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .search-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 3rem;
        }

        .search-input-wrapper {
            flex-grow: 1;
            position: relative;
        }

        #main-search-input {
            width: 100%;
            background: #222;
            border: 1px solid #444;
            padding: 15px 20px;
            border-radius: 4px;
            color: #fff;
            font-size: 1.2rem;
            outline: none;
        }

        #main-search-input:focus { border-color: var(--netflix-red); }

        .close-search {
            font-size: 2rem;
            cursor: pointer;
            color: #888;
            transition: 0.3s;
        }
        .close-search:hover { color: #fff; transform: rotate(90deg); }

        /* --- Search Results Grid --- */
        .results-container h2 { margin-bottom: 1.5rem; font-size: 1.5rem; color: #888; }
        
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .result-card {
            background: #181818;
            border-radius: 4px;
            overflow: hidden;
            transition: transform 0.3s;
            cursor: pointer;
        }

        .result-card:hover { transform: scale(1.05); z-index: 2; }
        .result-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .result-card div { padding: 10px; font-size: 0.85rem; font-weight: 600; }

        /* --- Original Hero Text & Tabs --- */
        main { flex-grow: 1; padding: 0 4rem; display: flex; align-items: center; }
        h1 { font-size: 5rem; font-weight: 800; margin-bottom: 1rem; }
        .description { max-width: 500px; color: #bbb; line-height: 1.6; }

        footer { background: rgba(0,0,0,0.6); border-top: 1px solid #333; }
        .tabs { display: grid; grid-template-columns: repeat(4, 1fr); }
        .tab-btn {
            background: none; border: none; padding: 1.5rem; color: #666;
            text-transform: uppercase; font-weight: 700; cursor: pointer;
        }
        .tab-btn.active { color: #fff; border-top: 3px solid #fff; }

    </style>
</head>
<body>

    <div id="search-overlay">
        <div class="search-header">
            <div class="search-input-wrapper">
                <input type="text" id="main-search-input" placeholder="Search titles, genres, or developers..." autofocus>
            </div>
            <div class="close-search" onclick="toggleSearch(false)">&times;</div>
        </div>

        <div class="results-container">
            <h2 id="search-heading">Recommended for You</h2>
            <div class="results-grid" id="results-grid">
                </div>
        </div>
    </div>

    <div class="hero-section" id="hero-main">
        <div id="bg-image-layer" style="background-image: url('https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=2070');"></div>

        <header>
            <div class="logo">GAMEDISTRO</div>
            <nav style="display: flex; align-items: center;">
                <div class="search-trigger" onclick="toggleSearch(true)">
                    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    <span>Search</span>
                </div>
                <a href="pages/groups/base.htm">Groups</a>
                <a href="pages/game dev pages/dev_dashboard.htm">Developers</a>
                <a href="pages/signup_login.htm">Sign In</a>
            </nav>
        </header>

        <main>
            <div id="hero-container">
                <h1 id="title">Pixel Streaming</h1>
                <p class="description" id="desc">High-end graphics to any device instantly.</p>
            </div>
        </main>

        <footer>
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('pixel', this)">Pixel Streaming</button>
                <button class="tab-btn" onclick="switchTab('ml', this)">ML & AI</button>
                <button class="tab-btn" onclick="switchTab('inference', this)">Inference</button>
                <button class="tab-btn" onclick="switchTab('vfx', this)">VFX & Rendering</button>
            </div>
        </footer>
    </div>

    <script>
        // Data for recommendations and search
        const games = [
            { title: "Elden Ring: Shadow of Erdtree", img: "https://www.bing.com/th/id/OSK.gMmC4T84yrEKrcDFarE4VE9m2L2gudkHQKwlDi1npKo?w=224&h=200&c=8&rs=1&qlt=90&o=6&cb=defcache1&dpr=1.3&pid=3.1&rm=2&defcache=1", category: "Action" },
            { title: "Cyberpunk 2077", img: "https://images.unsplash.com/photo-1605898835373-023ad4270243?auto=format&fit=crop&q=80&w=400", category: "RPG" },
            { title: "Ghost of Tsushima", img: "https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=400", category: "Adventure" },
            { title: "Starfield", img: "https://images.unsplash.com/photo-1614850523296-d8c1af93d400?auto=format&fit=crop&q=80&w=400", category: "Sci-Fi" },
            { title: "The Witcher 3", img: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80&w=400", category: "RPG" }
        ];

        // Toggle Search Overlay
        function toggleSearch(show) {
            const overlay = document.getElementById('search-overlay');
            overlay.style.display = show ? 'flex' : 'none';
            if(show) {
                document.getElementById('main-search-input').focus();
                renderResults(games); // Show recommendations by default
            }
        }

        // Render Cards
        function renderResults(list) {
            const grid = document.getElementById('results-grid');
            grid.innerHTML = list.map(game => `
                <div class="result-card">
                    <img src="${game.img}" alt="${game.title}">
                    <div>${game.title}</div>
                </div>
            `).join('');
        }

        // Search Logic
        document.getElementById('main-search-input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const heading = document.getElementById('search-heading');
            
            if (term === "") {
                heading.innerText = "Recommended for You";
                renderResults(games);
            } else {
                const filtered = games.filter(g => g.title.toLowerCase().includes(term));
                heading.innerText = filtered.length ? `Results for "${term}"` : "No results found";
                renderResults(filtered);
            }
        });

        // Tab Switching Logic (simplified)
        function switchTab(id, el) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            // ... (Your background change logic from previous code goes here)
        }

    </script>
</body>
</html>
