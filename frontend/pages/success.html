<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h3 style="margin-top: 0;">Success</h3>
<script>
async function createDevAccount() {
    const token = localStorage.getItem("accessToken");
    const data = JSON.parse(localStorage.getItem("devSignupData"));

    if (!data) {
        alert("No signup data found");
        return;
    }

    try {
        // STEP 1: Create developer account
        const response = await fetch("http://localhost:3000/dev/create-account", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({
                studio_name: data.studio_name,
                email: data.email,
                password: data.password,
                bio: data.bio,
                currency: "USD",
                language: "English"
            })
        });

        const resData = await response.json();

        if (!response.ok) {
            alert(resData.error);
            return;
        }
        console.log(resData);
        // STEP 2: Call onboarding API
        const onboardRes = await fetch("http://localhost:3000/pay/onboard", {
            method: "POST",
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        const onboardData = await onboardRes.json();

        if (!onboardRes.ok) {
            alert(onboardData.error || "Onboarding failed");
            return;
        }

        // STEP 3: Redirect to Stripe onboarding URL
        window.location.href = onboardData.url;

    } catch (err) {
        console.error(err);
        alert("Error creating dev account");
    }
}

createDevAccount();
</script>
</body>

</html>
