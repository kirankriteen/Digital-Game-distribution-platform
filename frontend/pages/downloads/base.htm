<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameDistro | Downloads</title>
    <style>
        :root {
            --netflix-red: #e50914;
            --progress-blue: #3b82f6;
            --bg-dark: #0a0a0a;
            --surface: #1a1a1a;
            --text-dim: #666;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 2rem 5%;
        }

        /* --- Header Stats --- */
        .download-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 3rem;
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid #333;
        }

        .stat-box h4 { color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; margin-bottom: 5px; }
        .stat-box p { font-size: 1.2rem; font-weight: 800; }

        /* --- Download List --- */
        .section-title { margin-bottom: 1.5rem; font-weight: 800; display: flex; align-items: center; gap: 10px; }
        .active-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 10px #22c55e; }

        .dl-list { display: flex; flex-direction: column; gap: 15px; }

        .dl-card {
            background: var(--surface);
            border-radius: 10px;
            padding: 1.2rem;
            display: grid;
            grid-template-columns: 80px 1fr 150px;
            align-items: center;
            gap: 20px;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .dl-card:hover { border-color: #444; background: #222; }

        .dl-thumb { width: 80px; aspect-ratio: 1/1; border-radius: 6px; object-fit: cover; }

        .dl-info h3 { font-size: 1rem; margin-bottom: 8px; }

        /* --- Progress Bar --- */
        .progress-container { width: 100%; background: #333; height: 6px; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--progress-blue); width: 0%; transition: width 0.5s ease; }
        .progress-fill.complete { background: #22c55e; }

        .dl-meta { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-dim); margin-top: 8px; }

        /* --- Actions --- */
        .dl-actions { display: flex; justify-content: flex-end; gap: 10px; }

        .icon-btn {
            background: #333;
            border: none;
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .icon-btn:hover { background: #444; }
        .icon-btn.cancel:hover { background: var(--netflix-red); }

    </style>
</head>
<body>

    <header style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center;">
        <h1 style="font-size: 2rem; font-weight: 900;">Downloads</h1>
        <a href="../../base.html" style="color: var(--text-dim); text-decoration: none; font-size: 0.9rem;">Back to Home</a>
    </header>

    <div class="download-stats">
        <div class="stat-box">
            <h4>Global Speed</h4>
            <p>124.5 Mbps</p>
        </div>
        <div class="stat-box">
            <h4>Disk Space</h4>
            <p>412 GB Free</p>
        </div>
        <div class="stat-box">
            <h4>Queue</h4>
            <p>2 Items Left</p>
        </div>
    </div>

    <section>
        <h2 class="section-title"><span class="active-dot"></span> Active Downloads</h2>
        <div class="dl-list">
            
            <div class="dl-card">
                <img src="https://images.unsplash.com/photo-1605898835373-023ad4270243?w=400" class="dl-thumb">
                <div class="dl-info">
                    <h3>Cyberpunk 2077</h3>
                    <div class="progress-container">
                        <div class="progress-fill" style="width: 65%;"></div>
                    </div>
                    <div class="dl-meta">
                        <span>42.1 GB / 68.0 GB</span>
                        <span>12 mins remaining</span>
                    </div>
                </div>
                <div class="dl-actions">
                    <button class="icon-btn">⏸</button>
                    <button class="icon-btn cancel">✕</button>
                </div>
            </div>

            <div class="dl-card" style="opacity: 0.7;">
                <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400" class="dl-thumb">
                <div class="dl-info">
                    <h3>Elden Ring</h3>
                    <div class="progress-container">
                        <div class="progress-fill complete" style="width: 100%;"></div>
                    </div>
                    <div class="dl-meta">
                        <span style="color: #22c55e;">Completed</span>
                        <span>52.4 GB</span>
                    </div>
                </div>
                <div class="dl-actions">
                    <button class="icon-btn" style="width: 80px; font-size: 0.8rem; font-weight: bold; background: #fff; color: #000;">PLAY</button>
                </div>
            </div>

        </div>
    </section>

    <section style="margin-top: 3rem;">
        <h2 class="section-title" style="color: var(--text-dim);">Paused / Scheduled</h2>
        <div class="dl-list">
             <div class="dl-card" style="filter: grayscale(1);">
                <img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?w=400" class="dl-thumb">
                <div class="dl-info">
                    <h3>Starfield</h3>
                    <div class="progress-container">
                        <div class="progress-fill" style="width: 12%; background: #555;"></div>
                    </div>
                    <div class="dl-meta">
                        <span>Paused</span>
                        <span>8.2 GB / 102.0 GB</span>
                    </div>
                </div>
                <div class="dl-actions">
                    <button class="icon-btn">▶</button>
                    <button class="icon-btn cancel">✕</button>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
