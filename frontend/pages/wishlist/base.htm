<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameDistro | My Wishlist</title>
    <style>
        :root {
            --netflix-red: #e50914;
            --accent-blue: #3b82f6;
            --card-bg: #141414;
            --text-dim: #888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 2rem 5%;
        }

        /* --- Navigation --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        .logo { 
            font-size: 1.5rem; 
            font-weight: 900; 
            color: var(--netflix-red); 
            text-decoration: none; 
            letter-spacing: -1px;
        }

        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            margin-left: 20px;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .nav-links a:hover { color: #fff; }

        /* --- Page Title --- */
        .title-section {
            margin-bottom: 2.5rem;
            border-left: 4px solid var(--netflix-red);
            padding-left: 1.5rem;
        }

        h1 { font-size: 2.5rem; font-weight: 800; }
        .subtitle { color: var(--text-dim); font-size: 1rem; margin-top: 5px; }

        /* --- Wishlist Grid --- */
        .wishlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .wish-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.3s ease, border-color 0.3s ease;
            position: relative;
        }

        .wish-card:hover {
            transform: translateY(-10px);
            border-color: rgba(255,255,255,0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .image-container {
            position: relative;
            aspect-ratio: 16/9;
        }

        .wish-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .remove-wish {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            border: none;
            color: #fff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            transition: 0.3s;
            opacity: 0;
        }

        .wish-card:hover .remove-wish { opacity: 1; }
        .remove-wish:hover { background: var(--netflix-red); }

        .wish-content { padding: 1.2rem; }

        .game-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
        
        .price-tag { 
            font-weight: 600; 
            color: #fff; 
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .discount-label {
            background: #22c55e;
            color: #000;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 900;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .add-cart-btn {
            flex-grow: 1;
            background: #fff;
            color: #000;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .add-cart-btn:hover { background: var(--accent-blue); color: #fff; }

    </style>
</head>
<body>

    <header class="header">
        <a href="../../base.html" class="logo">GAMEDISTRO</a>
        <nav class="nav-links">
            <a href="../../base.html">Home</a>
            <a href="../cart/base.htm">Cart</a>
            <a href="#">Settings</a>
        </nav>
    </header>

    <div class="title-section">
        <h1>My Wishlist</h1>
        <p class="subtitle">Track games you're excited to play.</p>
    </div>

    <div class="wishlist-grid" id="wishlist-container">
        <div class="wish-card">
            <div class="image-container">
                <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=400" class="wish-img">
                <button class="remove-wish" onclick="removeWish(this)" title="Remove from Wishlist">&times;</button>
            </div>
            <div class="wish-content">
                <div class="game-title">Ghost of Tsushima</div>
                <div class="price-tag">
                    $59.99 <span class="discount-label">NEW DLC</span>
                </div>
                <div class="btn-group">
                    <button class="add-cart-btn">Add to Cart</button>
                </div>
            </div>
        </div>

        <div class="wish-card">
            <div class="image-container">
                <img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?auto=format&fit=crop&q=80&w=400" class="wish-img">
                <button class="remove-wish" onclick="removeWish(this)" title="Remove from Wishlist">&times;</button>
            </div>
            <div class="wish-content">
                <div class="game-title">Starfield</div>
                <div class="price-tag">
                    $69.99 <span class="discount-label" style="background: var(--netflix-red); color: white;">-20%</span>
                </div>
                <div class="btn-group">
                    <button class="add-cart-btn">Add to Cart</button>
                </div>
            </div>
        </div>
    </div>

    <script src="wishlist.js">
    </script>
</body>
</html>
