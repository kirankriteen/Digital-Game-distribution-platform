<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameDistro | Shopping Cart</title>
    <style>
        :root {
            --netflix-red: #e50914;
            --accent: #3b82f6;
            --surface: #141414;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 2rem 5%;
        }

        /* --- Header --- */
        .cart-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4rem;
        }

        .logo { font-size: 1.5rem; font-weight: 900; color: var(--netflix-red); text-decoration: none; }
        
        .back-btn {
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }
        .back-btn:hover { color: #fff; }

        /* --- Layout --- */
        .cart-wrapper {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 3rem;
        }

        @media (max-width: 1000px) {
            .cart-wrapper { grid-template-columns: 1fr; }
        }

        /* --- Items List --- */
        h2 { font-size: 2rem; margin-bottom: 2rem; font-weight: 800; }
        
        .cart-items { display: flex; flex-direction: column; gap: 1rem; }

        .item-card {
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.2rem;
            gap: 1.5rem;
            transition: 0.3s;
            position: relative;
        }

        .item-card:hover { border-color: #444; background: #1a1a1a; }

        .item-img {
            width: 200px;
            aspect-ratio: 16/9;
            object-fit: cover;
            border-radius: 6px;
        }

        .item-details {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .item-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
        .item-category { color: #666; font-size: 0.8rem; text-transform: uppercase; }

        .item-price { font-size: 1.1rem; font-weight: 700; color: #fff; }

        .remove-btn {
            background: none;
            border: none;
            color: #555;
            cursor: pointer;
            font-size: 0.8rem;
            text-decoration: underline;
            width: fit-content;
            transition: 0.3s;
        }
        .remove-btn:hover { color: var(--netflix-red); }

        /* --- Summary Sidebar --- */
        .summary-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            height: fit-content;
            position: sticky;
            top: 2rem;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            color: #aaa;
        }

        .total-row {
            border-top: 1px solid var(--border);
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            font-size: 1.4rem;
            font-weight: 800;
            color: #fff;
        }

        .checkout-btn {
            width: 100%;
            background: #fff;
            color: #000;
            border: none;
            padding: 1.2rem;
            border-radius: 8px;
            font-weight: 800;
            font-size: 1rem;
            margin-top: 2rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .checkout-btn:hover {
            background: var(--netflix-red);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(229, 9, 20, 0.3);
        }

        .promo-box {
            margin-top: 1.5rem;
            display: flex;
            gap: 10px;
        }

        .promo-box input {
            background: #222;
            border: 1px solid #444;
            padding: 0.8rem;
            border-radius: 4px;
            color: #fff;
            flex-grow: 1;
        }
    </style>
</head>
<body>

    <header class="cart-nav">
        <a href="../../base.html" class="logo">GAMEDISTRO</a>
        <a href="../../base.html" class="back-btn">← Continue Shopping</a>
    </header>

    <div class="cart-wrapper">
        <section>
            <h2>Your Cart (<span id="cart-count">2</span>)</h2>
            <div class="cart-items" id="cart-list">
                <div class="item-card">
                    <img src="https://www.bing.com/th/id/OSK.gMmC4T84yrEKrcDFarE4VE9m2L2gudkHQKwlDi1npKo?w=224&h=200&c=8&rs=1&qlt=90&o=6&cb=defcache1&dpr=1.3&pid=3.1&rm=2&defcache=1" class="item-img">
                    <div class="item-details">
                        <div>
                            <div class="item-category">Action RPG</div>
                            <div class="item-title">Elden Ring: Shadow of Erdtree</div>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                            <button class="remove-btn" onclick="removeItem(this)">Remove</button>
                            <div class="item-price">$39.99</div>
                        </div>
                    </div>
                </div>

                <div class="item-card">
                    <img src="https://images.unsplash.com/photo-1605898835373-023ad4270243?auto=format&fit=crop&q=80&w=400" class="item-img">
                    <div class="item-details">
                        <div>
                            <div class="item-category">Open World</div>
                            <div class="item-title">Cyberpunk 2077</div>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                            <button class="remove-btn" onclick="removeItem(this)">Remove</button>
                            <div class="item-price">$29.99</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <aside>
            <div class="summary-card">
                <h3 style="margin-bottom: 1.5rem;">Order Summary</h3>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span>$69.98</span>
                </div>
                <div class="summary-row">
                    <span>Taxes</span>
                    <span>$0.00</span>
                </div>
                <div class="promo-box">
                    <input type="text" placeholder="Promo Code">
                </div>
                
                <div class="summary-row total-row">
                    <span>Total</span>
                    <span>$69.98</span>
                </div>

                <button class="checkout-btn">Proceed to Checkout</button>
                
                <p style="color: #555; font-size: 0.75rem; margin-top: 1.5rem; text-align: center;">
                    Secure Checkout powered by GameDistro Edge
                </p>
            </div>
        </aside>
    </div>

    <script>
        function removeItem(btn) {
            const card = btn.closest('.item-card');
            card.style.opacity = '0';
            card.style.transform = 'translateX(-20px)';
            setTimeout(() => {
                card.remove();
                updateCount();
            }, 300);
        }

        function updateCount() {
            const items = document.querySelectorAll('.item-card').length;
            document.getElementById('cart-count').innerText = items;
            if(items === 0) {
                document.getElementById('cart-list').innerHTML = "<p style='color:#444; padding: 2rem;'>Your cart is empty.</p>";
            }
        }
    </script>
</body>
</html>
