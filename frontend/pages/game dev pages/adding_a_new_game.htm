<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Portal | Add New Game</title>
    <style>
        :root {
            --primary: #10b981;
            --primary-hover: #4f46e5;
            --bg-body: #09090b;
            --bg-card: #18181b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #f59e0b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 30px;
        }

        /* Form Styling */
        .form-card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        h1 { margin-top: 0; font-size: 1.5rem; color: var(--primary); }
        h3 { font-size: 1rem; margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 10px; }

        .input-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted); }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
        }

        .file-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .drop-zone {
            border: 2px dashed #475569;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.8rem;
        }

        .drop-zone:hover { border-color: var(--primary); background: #1e293b; }
        .drop-zone.success { border-color: var(--accent); color: var(--accent); }

        .submit-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }

        .submit-btn:hover { background: var(--primary-hover); }

        /* Preview Sidebar */
        .preview-card {
            background: #1e293b;
            border-radius: 16px;
            overflow: hidden;
            height: fit-content;
            position: sticky;
            top: 40px;
            border: 1px solid #334155;
        }

        .preview-img {
            width: 100%;
            height: 180px;
            background: #0f172a;
            object-fit: cover;
            display: block;
        }

        .preview-content { padding: 20px; }
        .preview-tag {
            background: var(--primary);
                font-size: 0.7rem;
                padding: 3px 8px;
                border-radius: 4px;
                text-transform: uppercase;
            }

            @media (max-width: 850px) {
                .container { grid-template-columns: 1fr; }
            }
        </style>
    </head>
    <body>
    <div class="container">
    <div class="form-card">
        <h1>Add New Game</h1>

        <form id="gameForm">
            <section>
                <h3>Metadata</h3>
                <div class="input-group">
                    <label>Game Title</label>
                    <input type="text" id="inTitle" required>
                </div>

                <div class="input-group">
                    <label>Genre</label>
                    <select id="inGenre">
                        <option>Action</option>
                        <option>RPG</option>
                        <option>Horror</option>
                        <option>Simulation</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Price</label>
                    <input type="number" id="inPrice">
                </div>

                <div class="input-group">
                    <label>Description</label>
                    <textarea id="inBio"></textarea>
                </div>
            </section>

            <section>
                <h3>System Requirements</h3>

                <div class="input-group">
                    <label>OS</label>
                    <input type="text" id="inOS">
                </div>

                <div class="input-group">
                    <label>Processor</label>
                    <input type="text" id="inProcessor">
                </div>

                <div class="input-group">
                    <label>Memory</label>
                    <input type="text" id="inMemory">
                </div>

                <div class="input-group">
                    <label>Storage</label>
                    <input type="text" id="inStorage">
                </div>
            </section>

            <section>
                <h3>Assets</h3>

                <div class="input-group">
                    <label>Cover Image (Preview)</label>
                    <input type="file" id="inCoverPreview" accept="image/*">
                </div>

                <div class="file-grid">
                    <div class="drop-zone" id="gameZipZone">
                        <span id="gameZipLabel">Upload Game ZIP</span>
                        <input type="file" id="inGameZip" accept=".zip" hidden>
                    </div>

                    <div class="drop-zone" id="assetsZipZone">
                        <span id="assetsZipLabel">Upload Assets ZIP (cover,img1,img2,img3,video)</span>
                        <input type="file" id="inAssetsZip" accept=".zip" hidden>
                    </div>
                </div>
            </section>

            <button type="submit" class="submit-btn">Publish Game</button>
        </form>
    </div>

        <aside>
            <h3 style="color:gray;">Live Preview</h3>
        
            <div class="preview-card">
                <img id="preImg" src="https://via.placeholder.com/400x200" class="preview-img">
            
                <div class="preview-content">
                    <span id="preGenre" class="preview-tag">Genre</span>
                    <h2 id="preTitle">Untitled Game</h2>
                
                    <span id="prePrice">Free</span>
                </div>
            </div>
        </aside>
    </div>
    <script src="add_a_new_game.js"></script>

<style>
    /* Default (Action) Colors */
    :root {
        --primary: #f43f5e;       /* Rose Red */
        --primary-hover: #e11d48;
        --bg-body: #0c0a09;
        --bg-card: #1c1917;
        --text-main: #f8fafc;
        --text-muted: #a8a29e;
        --accent: #ffffff;
        transition: all 0.5s ease; /* Smooth color morphing */
    }

    /* ... rest of your previous CSS remains the same ... */
</style>
<script>
    // 1. Define the Color Themes for each Genre
    const genreThemes = {
        "Action": {
            primary: "#f43f5e",
            card: "#1c1917",
            body: "#0c0a09"
        },
        "RPG": {
            primary: "#8b5cf6",
            card: "#1e293b",
            body: "#020617"
        },
        "Horror": {
            primary: "#7f1d1d",
            card: "#1a0a0a",
            body: "#050000"
        },
        "Simulation": {
            primary: "#10b981",
            card: "#18181b",
            body: "#09090b"
        }
    };

    const inGenre = document.getElementById('inGenre');
    const root = document.documentElement;

    // 2. Function to update CSS Variables
    function updateTheme(genre) {
        const theme = genreThemes[genre];

        root.style.setProperty('--primary', theme.primary);
        root.style.setProperty('--bg-card', theme.card);
        root.style.setProperty('--bg-body', theme.body);

        document.getElementById('preGenre').innerText = genre;
    }

    // 3. Listen for Genre Changes
    inGenre.addEventListener('change', (e) => {
        updateTheme(e.target.value);
    });
</script>
</body>
</html>
