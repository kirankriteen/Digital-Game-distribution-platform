<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Portal | Add New Game</title>
    <style>
        :root {
            --primary: #10b981;
            --primary-hover: #4f46e5;
            --bg-body: #09090b;
            --bg-card: #18181b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #f59e0b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 30px;
        }

        /* Form Styling */
        .form-card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        h1 { margin-top: 0; font-size: 1.5rem; color: var(--primary); }
        h3 { font-size: 1rem; margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 10px; }

        .input-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted); }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
        }

        .file-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .drop-zone {
            border: 2px dashed #475569;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.8rem;
        }

        .drop-zone:hover { border-color: var(--primary); background: #1e293b; }
        .drop-zone.success { border-color: var(--accent); color: var(--accent); }

        .submit-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }

        .submit-btn:hover { background: var(--primary-hover); }

        /* Preview Sidebar */
        .preview-card {
            background: #1e293b;
            border-radius: 16px;
            overflow: hidden;
            height: fit-content;
            position: sticky;
            top: 40px;
            border: 1px solid #334155;
        }

        .preview-img {
            width: 100%;
            height: 180px;
            background: #0f172a;
            object-fit: cover;
            display: block;
        }

        .preview-content { padding: 20px; }
        .preview-tag {
            background: var(--primary);
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        @media (max-width: 850px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-card">
        <h1>Add New Game</h1>
        <form id="gameForm">
            <section>
                <h3>Metadata</h3>
                <div class="input-group">
                    <label>Game Title</label>
                    <input type="text" id="inTitle" placeholder="e.g. Star Valor" required>
                </div>
                <div class="input-group">
                    <label>Genre</label>
                    <select id="inGenre">
                        <option value="Action">Action</option>
                        <option value="RPG">RPG</option>
                        <option value="Horror">Horror</option>
                        <option value="Simulation">Simulation</option>
                    </select>
                </div>
            </section>

            <section>
                <h3>Assets</h3>
                <div class="file-grid">
                    <div class="drop-zone" id="thumbZone">
                        <span id="thumbLabel">Upload Cover Image</span>
                        <input type="file" id="inThumb" accept="image/*" hidden>
                    </div>
                    <div class="drop-zone" id="buildZone">
                        <span id="buildLabel">Upload Game (.zip)</span>
                        <input type="file" id="inBuild" accept=".zip,.rar" hidden>
                    </div>
                </div>
            </section>

            <button type="submit" class="submit-btn" id="submitBtn">Publish Game</button>
        </form>
    </div>

    <aside>
        <h3 style="border:none; color:var(--text-muted)">Live Store Preview</h3>
        <div class="preview-card">
            <img src="https://via.placeholder.com/400x200?text=Game+Cover" alt="Preview" class="preview-img" id="preImg">
            <div class="preview-content">
                <span class="preview-tag" id="preGenre">Genre</span>
                <h2 id="preTitle" style="margin: 10px 0 5px 0;">Untitled Game</h2>
                <p style="color:var(--text-muted); font-size: 0.9rem;">Developer: You</p>
                <div style="display:flex; justify-content: space-between; align-items: center; margin-top: 20px;">
                    <span style="font-weight: bold; font-size: 1.2rem;">Free</span>
                    <button disabled style="background:#334155; color:white; border:none; padding: 8px 15px; border-radius:4px;">Buy Now</button>
                </div>
            </div>
        </div>
    </aside>
</div>

<style>
    /* Default (Action) Colors */
    :root {
        --primary: #f43f5e;       /* Rose Red */
        --primary-hover: #e11d48;
        --bg-body: #0c0a09;
        --bg-card: #1c1917;
        --text-main: #f8fafc;
        --text-muted: #a8a29e;
        --accent: #ffffff;
        transition: all 0.5s ease; /* Smooth color morphing */
    }

    /* ... rest of your previous CSS remains the same ... */
</style>

<script>
    // 1. Define the Color Themes for each Genre
    const genreThemes = {
        "Action": {
            primary: "#f43f5e", // Rose Red
            card: "#1c1917",
            body: "#0c0a09"
        },
        "RPG": {
            primary: "#8b5cf6", // Violet Purple
            card: "#1e293b",
            body: "#020617"
        },
        "Horror": {
            primary: "#7f1d1d", // Blood Maroon
            card: "#1a0a0a",
            body: "#050000"
        },
        "Simulation": {
            primary: "#10b981", // Emerald Green
            card: "#18181b",
            body: "#09090b"
        }
    };

    const inGenre = document.getElementById('inGenre');
    const root = document.documentElement;

    // 2. Function to update CSS Variables
    function updateTheme(genre) {
        const theme = genreThemes[genre];
        
        // Update CSS Variables dynamically
        root.style.setProperty('--primary', theme.primary);
        root.style.setProperty('--bg-card', theme.card);
        root.style.setProperty('--bg-body', theme.body);
        
        // Update the Live Preview Tag
        document.getElementById('preGenre').innerText = genre;
    }

    // 3. Listen for Genre Changes
    inGenre.addEventListener('change', (e) => {
        updateTheme(e.target.value);
    });

    // --- Original Logic for Uploads ---
    const inTitle = document.getElementById('inTitle');
    const inThumb = document.getElementById('inThumb');
    const preTitle = document.getElementById('preTitle');
    const preImg = document.getElementById('preImg');
    const thumbZone = document.getElementById('thumbZone');

    inTitle.oninput = (e) => preTitle.innerText = e.target.value || "Untitled Game";

    thumbZone.onclick = () => inThumb.click();
    inThumb.onchange = () => {
        const file = inThumb.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                preImg.src = e.target.result;
                thumbZone.classList.add('success');
            };
            reader.readAsDataURL(file);
        }
    };
</script>
</body>
</html>
