<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Analytics | GameDistro</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <script src="../../devGuard.js"></script>

    <nav class="sidebar">
      <div class="logo">
        <a href="../../base.html" style="text-decoration: none"
          >Game Distribution System</a
        >
      </div>
      <a href="dev_dashboard.htm" class="nav-item">Dashboard</a>
      <a href="dev_games_section.htm" class="nav-item">My Games</a>
      <a href="dev_analysis.htm" class="nav-item active">Analytics</a>
      <a href="dev_payouts.htm" class="nav-item">Payouts</a>
      <a href="dev_settings.htm" class="nav-item">Settings</a>
    </nav>

    <main>
      <div class="header">
        <h1>Performance Analytics</h1>

        <div style="display: flex; gap: 10px">
          <select class="search-bar" id="timeRangeSelect" style="width: 180px">
            <option>All Time</option>
            <option>Last 30 Days</option>
            <option>Last 6 Months</option>
          </select>

          <button class="btn-primary" id="exportReportBtn">
            Export Report
          </button>
        </div>
      </div>

      <div class="bento-grid">
        <div class="card rev-card" style="grid-column: span 3; height: 400px">
          <h3 style="margin-top: 0">Revenue Overview</h3>
          <canvas id="revenueChart"></canvas>
        </div>

        <div class="card" style="grid-column: span 1">
          <h3 style="margin-top: 0">Average Order Value</h3>

          <div style="text-align: center; padding: 40px 0">
            <span
              id="conversionRate"
              style="font-size: 3rem; font-weight: 800; color: var(--primary)"
            >
              --
            </span>
            <p style="color: var(--text-dim)">Per Transaction</p>
          </div>

          <div style="border-top: 1px solid var(--border); padding-top: 20px">
            <p id="conversionTrend" style="font-size: 0.8rem; color: #4ade80">
              --
            </p>
          </div>
        </div>
      </div>
    </main>

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script src="dev_analysis.js"></script>
  </body>
</html>
