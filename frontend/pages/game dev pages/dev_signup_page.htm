<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Company</title>
    <link rel="stylesheet" href="styles.css"> 
    <!-- Theme variables -->
  <style>
    body {
    font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    width: 50%;
    max-width: 600px;
    background: var(--bg-card-solid);
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    border: 1px solid var(--border);
}

h1 {
    margin: 0;
    font-size: 1.8rem;
    font-weight: 800;
    color: var(--primary);
}

.form-group {
    margin-bottom: 18px;
}

label {
    display: block;
    margin-bottom: 8px;
    font-size: 0.9rem;
    color: var(--text-dim);
}

input, select, textarea {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--input-bg);
    color: white;
    box-sizing: border-box;
    outline: none;
    transition: 0.2s;
}

input:focus, select:focus, textarea:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
}

.btn-primary {
    background: var(--primary);
    color: white;
    padding: 12px 24px;
    border-radius: 12px;
    text-decoration: none;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: 0.2s;
    display: inline-block;
    box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.3);
}

.btn-primary:hover {
    background: var(--primary-hover);
    transform: translateY(-2px);
}

  </style>

</head>
<body>

<div class="container">
    <h1>Create New Company</h1>
    <form id="companyForm">
        <div class="form-">
            <label for="companyName">Company Name:</label>
            <input type="text" id="companyName" name="companyName" required placeholder="Enter company name">
        </div>
        <div class="form-group">
            <label for="contactEmail">Contact Email:</label>
            <input type="email" id="contactEmail" name="contactEmail" required placeholder="Enter contact email">
        </div>
        <div class="form-group">
            <label for="companyPassword">Company Password:</label>
            <input type="password" id="companyPassword" name="companyPassword" required placeholder="Enter company password">
        </div>
        <div class="form-group">
            <label for="companyBio">Company Bio:</label>
            <textarea id="companyBio" name="companyBio" rows="4" required placeholder="Enter company bio"></textarea>
        </div>
        <a href='dev_dashboard.htm' <button type="submit" class="btn-primary">Create Company</button> </a>
    </form>
</div>

<script>
document.getElementById('companyForm').addEventListener('submit', function(event) {
    event.preventDefault();
    
    const companyName = document.getElementById('companyName').value;
    const contactEmail = document.getElementById('contactEmail').value;
    const companyPassword = document.getElementById('companyPassword').value;
    const companyBio = document.getElementById('companyBio').value;

    if (companyName && contactEmail && companyPassword && companyBio) {
        alert(`Company Created Successfully:
- Name: ${companyName}
- Email: ${contactEmail}
- Password: ${companyPassword}
- Bio: ${companyBio}`);
        
        // Reset form
        document.getElementById('companyForm').reset();
    } else {
        alert('Please fill out all fields.');
    }
});
</script>

</body>
</html>
