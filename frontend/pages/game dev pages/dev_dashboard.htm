    <script src="../../devGuard.js"></script>
    <style>
      :root {
        --primary: #8b5cf6;
        --text-theme-color: #8b5cf6;
        --card: #1e293b;
        --border: #334155;
        --sidebar: #0f172a;
        --text-dim: #94a3b8;
      }

      /* ===== BASE ===== */
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #020617;
        color: white;
        display: flex;
      }

      /* ===== SIDEBAR ===== */
      nav {
        width: 260px;
        background: var(--sidebar);
        border-right: 1px solid rgba(255, 255, 255, 0.05);
        padding: 30px 20px;
        display: flex;
        flex-direction: column;
      }

      .logo a {
        font-weight: 800;
        font-size: 1.5rem;
        color: var(--primary);
        text-decoration: none;
        margin-bottom: 40px;
      }

      .nav-item {
        padding: 12px 15px;
        border-radius: 8px;
        color: var(--text-dim);
        text-decoration: none;
        margin-bottom: 6px;
        transition: 0.3s;
      }

      .nav-item:hover {
        background: rgba(255, 255, 255, 0.05);
        color: white;
      }

      .nav-item.active {
        background: var(--primary);
        color: white;
      }

      /* ===== MAIN ===== */
      .main-container {
        flex: 1;
        padding: 40px;
        background: radial-gradient(
          circle at top right,
          rgba(99, 102, 241, 0.08),
          transparent
        );
        min-height: 100vh;
      }

      /* ===== HEADER ===== */
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 35px;
      }

      .header h1 {
        margin: 0;
        font-size: 1.8rem;
      }

      /* ===== BUTTON ===== */
      .btn-primary {
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        color: white;
        padding: 12px 22px;
        border-radius: 12px;
        font-weight: 600;
        text-decoration: none;
        box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        transition: 0.3s;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 0 30px rgba(99, 102, 241, 0.7);
      }

      /* ===== STATS GRID ===== */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 25px;
        margin-bottom: 40px;
      }

      .card {
        background: linear-gradient(145deg, #1e1b4b, #0f172a);
        border-radius: 20px;
        padding: 25px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        transition: all 0.3s ease;
      }

      .card:hover {
        transform: translateY(-6px);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        border-color: var(--primary);
      }

      .stat-label {
        font-size: 0.95rem;
        color: #9ca3af;
        font-weight: 600;
      }

      .stat-value {
        font-size: 2.8rem;
        font-weight: 800;
        margin-top: 10px;
        display: block;
      }

      /* ===== BADGES ===== */
      .badge {
        display: inline-block;
        margin-top: 12px;
        padding: 6px 14px;
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 600;
      }

      .revenue-badge {
        background: rgba(34, 197, 94, 0.2);
        color: #4ade80;
      }

      .live-now-badge {
        background: rgba(99, 102, 241, 0.2);
        color: #a5b4fc;
      }

      /* ===== PROJECTS SECTION ===== */
      .projects-list-card {
        background: linear-gradient(145deg, #1a1440, #0f172a);
        border-radius: 20px;
        padding: 25px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
      }

      .projects-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
      }

      .projects-title {
        font-size: 1.4rem;
        font-weight: 700;
        color: #818cf8;
        line-height: 1.2;
      }

      .filters-wrapper {
        display: flex;
        gap: 12px;
      }

      .theme-selector,
      .project-search {
        background: #0f172a;
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 10px 14px;
        border-radius: 10px;
        color: white;
        outline: none;
      }

      .theme-selector:focus,
      .project-search:focus {
        border-color: var(--primary);
        box-shadow: 0 0 10px var(--primary);
      }

      /* ===== TABLE ===== */
      .projects-table-wrapper {
        max-height: 300px;
        overflow-y: auto;
        border-radius: 12px;
      }

      .projects-table-wrapper::-webkit-scrollbar {
        width: 6px;
      }

      .projects-table-wrapper::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      thead th {
        text-align: left;
        padding: 14px;
        font-size: 0.85rem;
        color: #9ca3af;
        position: sticky;
        top: 0;
        background: #0f172a;
        z-index: 2;
      }

      tbody tr {
        transition: 0.2s;
      }

      tbody tr:hover {
        background: rgba(255, 255, 255, 0.03);
      }

      td {
        padding: 16px 14px;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
      }

      /* ===== THEME TEXT ===== */
      .theme-colored-text {
        color: var(--text-theme-color);
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="logo">
        <a href="../../base.html" style="text-decoration: none"
          >Game Distribution System</a
        >
      </div>
      <a href="dev_dashboard.htm" class="nav-item active">Dashboard</a>
      <a href="dev_games_section.htm" class="nav-item">My Games</a>
      <a href="dev_analysis.htm" class="nav-item">Analytics</a>
      <a href="dev_payouts.htm" class="nav-item">Payouts</a>
      <a href="dev_settings.htm" class="nav-item">Settings</a>
    </nav>

    <main class="main-container">
      <div class="header">
        <h1>Overview</h1>
        <a href="adding_a_new_game.htm" class="btn-primary" id="addGameBtn"
          >+ New Game</a
        >
      </div>

      <div class="stats-grid">
        <div class="card rev-card">
          <span class="stat-label">Total Revenue</span>
          <span class="stat-value" id="revVal">$0</span>
          <div class="badge revenue-badge">↑ 0% vs last month</div>
        </div>

        <div class="card dl-card">
          <span class="stat-label">Downloads</span>
          <span class="stat-value" id="downloadsVal">0</span>
          <div class="studio-lifetime">Studio Lifetime</div>
        </div>

        <div class="card active-card">
          <span class="stat-label">Active Players</span>
          <span class="stat-value" id="activePlayersVal">0</span>
          <div class="badge live-now-badge">Live Now</div>
        </div>
      </div>

      <div class="projects-list-card">
        <div class="projects-header">
          <div class="projects-title">Your<br />Projects</div>

          <div class="filters-wrapper">
            <select id="themeSelector" class="theme-selector">
              <option value="All">Theme: All</option>
              <option value="Action">Theme: Action</option>
              <option value="RPG">Theme: RPG</option>
              <option value="Horror">Theme: Horror</option>
            </select>

            <input
              type="search"
              id="projectSearch"
              class="project-search"
              placeholder="Search projects..."
              autocomplete="off"
            />
          </div>
        </div>

        <div class="projects-table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Project</th>
                <th>Genre</th>
                <th>Sales</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="projectsTable"></tbody>
          </table>
        </div>
      </div>
    </main>

    <script>
      const themes = {
        RPG: "#8b5cf6",
        Action: "#f43f5e",
        Horror: "#450a0a",
      };

      const selector = document.getElementById("themeSelector");

      selector.addEventListener("change", (e) => {
        const color = themes[e.target.value];
        document.documentElement.style.setProperty("--primary", color);
        // Add a subtle glow to the revenue value
        document.getElementById("revVal").style.textShadow =
          `0 0 20px ${color}55`;
      });
    </script>
    <script src="dev_dashborad.js"></script>
  </body>
</html>
