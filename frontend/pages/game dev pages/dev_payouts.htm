<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payouts | GAMEDISTRO</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <script src="../../devGuard.js"></script>

    <nav>
      <div class="logo">
        <a href="../../base.html" style="text-decoration: none">
          Game Distribution System
        </a>
      </div>
      <a href="dev_dashboard.htm" class="nav-item">Dashboard</a>
      <a href="dev_games_section.htm" class="nav-item">My Games</a>
      <a href="dev_analysis.htm" class="nav-item">Analytics</a>
      <a href="dev_payouts.htm" class="nav-item active">Payouts</a>
      <a href="dev_settings.htm" class="nav-item">Settings</a>
    </nav>

    <main>
      <div class="header">
        <h1>Financial Overview</h1>
        <button class="btn-primary" id="withdrawBtn">Withdraw Funds</button>
      </div>

      <!-- KEEP ORIGINAL GRID -->
      <div class="bento-grid">
        <!-- Available -->
        <div class="card" style="grid-column: span 2">
          <span class="text-dim">Available for Withdrawal</span>
          <div
            id="availableBalance"
            style="font-size: 2.5rem; font-weight: 800; margin: 10px 0"
          >
            $0
          </div>
          <span class="badge">Next Payout</span>
        </div>

        <!-- Lifetime -->
        <div class="card">
          <span class="text-dim">Lifetime Earnings</span>
          <div
            id="lifetimeEarnings"
            style="font-size: 1.8rem; font-weight: 800; margin: 10px 0"
          >
            $0
          </div>
          <span class="text-dim" style="font-size: 0.8rem">All-time total</span>
        </div>

        <!-- Pending -->
        <div class="card">
          <span class="text-dim">Pending Clearance</span>
          <div
            id="pendingBalance"
            style="font-size: 1.8rem; font-weight: 800; margin: 10px 0"
          >
            $0
          </div>
          <span class="text-dim" style="font-size: 0.8rem"
            >7-day hold period</span
          >
        </div>
      </div>

      <!-- KEEP ORIGINAL TABLE STYLE -->
      <div class="card mt-20">
        <h3>Recent Transactions</h3>

        <table style="width: 100%; border-collapse: collapse; text-align: left">
          <thead>
            <tr
              style="
                color: var(--text-dim);
                font-size: 0.85rem;
                border-bottom: 1px solid var(--border);
              "
            >
              <th style="padding: 15px 10px">Date</th>
              <th style="padding: 15px 10px">Method</th>
              <th style="padding: 15px 10px">Amount</th>
              <th style="padding: 15px 10px">Status</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td style="padding: 15px 10px">--</td>
              <td style="padding: 15px 10px">--</td>
              <td style="padding: 15px 10px">--</td>
              <td style="padding: 15px 10px"><span class="badge">--</span></td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>

    <!-- JS -->
    <script src="dev_payouts.js"></script>
  </body>
</html>
