<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload ZIP</title>
</head>
<body>
  <h2>Upload ZIP File</h2>

  <label for="zipInput">Select ZIP File:</label>
  <input type="file" id="zipInput" accept=".zip" /><br><br>

  <button id="uploadBtn">Upload ZIP</button>

  <br><br>
  <progress id="uploadProgress" value="0" max="100" style="width:300px;"></progress>
  <span id="progressText">0%</span>

  <script src="upload_zip.js"></script>
</body>
</html>
