<!DOCTYPE html>
<html>
<head>
  <title>Upload Game</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>

<h2>Upload Game File</h2>

<input type="file" id="fileInput">
<button onclick="uploadFile()">Upload</button>

<br><br>

<div style="width:400px;height:20px;border:1px solid black;">
  <div id="progressBar" style="height:100%;width:0%;background:green;"></div>
</div>

<p id="progressText">0%</p>

<script>
async function uploadFile() {

  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    alert("Select a file first");
    return;
  }

  // Step 1: get presigned URL
  const res = await axios.get(`/upload-games?filename=${file.name}`);
  const uploadUrl = res.data.uploadUrl;

  // Step 2: upload directly to MinIO
  await axios.put(uploadUrl, file, {
    headers: {
      "Content-Type": file.type
    },

    onUploadProgress: function(progressEvent) {

      const percent = Math.round(
        (progressEvent.loaded * 100) / progressEvent.total
      );

      document.getElementById("progressBar").style.width = percent + "%";
      document.getElementById("progressText").innerText = percent + "%";
    }
  });

  alert("Upload complete!");
}
</script>

</body>
</html>
